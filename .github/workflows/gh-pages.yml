name: GitHub Pages

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust and mdbook
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          cargo install mdbook

      - name: Build main
        run: mdbook build -d build

      - name: Build Hexagon
        run: cd opt/hexagon && mdbook build -d build

      - name: Build TroubleShooting
        run: cd troubleshooting && mdbook build -d build

      - name: Assemble site
        run: |
          mkdir -p site/opt/hexagon site/troubleshooting
          cp -r build/. site/
          cp -r opt/hexagon/build/. site/opt/hexagon/
          cp -r troubleshooting/build/. site/troubleshooting/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
